name: Compilar Mod OnePieceCraft

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Compilar
        run: |
          cd onepiececraft-mod
          chmod +x gradlew
          ./gradlew build --no-daemon
      - name: Salvar JAR
        uses: actions/upload-artifact@v4
        with:
          name: onepiececraft-mod-jar
          path: onepiececraft-mod/build/libs/onepiececraft-*.jar
          retention-days: 30
